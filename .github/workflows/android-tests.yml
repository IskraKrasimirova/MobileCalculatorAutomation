name: Android UI Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-snapshot -noaudio -no-window -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            # Start logcat
            nohup adb logcat > logcat.log 2>&1 &

            # Start Appium
            nohup appium > appium.log 2>&1 &
            sleep 5

            # Install Google Calculator APK
            adb install MobileUITests/Apks/calculator.apk

            # .NET build + test
            dotnet restore
            dotnet build --configuration Release
            dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.xml"
        env:
          APPIUM__AppPackage: com.google.android.calculator
          APPIUM__AppActivity: com.android.calculator2.Calculator
          APPIUM__DeviceName: emulator-5554
          APPIUM__PlatformVersion: "15"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: Screenshots/

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log

      - name: Upload emulator logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat
          path: logcat.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/test-results.xml"

      - name: Ensure Extent Report exists
        if: always()
        run: |
          mkdir -p MobileUITests/bin/Release/net8.0/Reports
          touch MobileUITests/bin/Release/net8.0/Reports/TestReport.html

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: MobileUITests/bin/Release/net8.0/Reports/
